<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đăng ký - FoodieDash</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="css/register.css" rel="stylesheet">
    <link href="css/index.css" rel="stylesheet">
    <style>
        .register-section { background-color: #f89d35; padding-top: 50px; padding-bottom: 50px; flex: 1; }
        .card-registration { border-radius: 15px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container px-4 px-lg-5">
            <a class="navbar-brand" href="index.html"><i class="bi bi-egg-fried"></i> FoodieDash</a>
        </div>
    </nav>

    <section class="register-section d-flex align-items-center">
        <div class="container">
            <div class="row d-flex justify-content-center align-items-center">
                <div class="col-12 col-md-10 col-lg-8 col-xl-6">
                    <div class="card card-registration">
                        <div class="card-body p-4 p-md-5">
                            <h2 class="text-uppercase text-center mb-4">Tạo tài khoản</h2>
                            <div id="errorMessage" class="alert alert-danger d-none" role="alert"></div>
                            <div id="successMessage" class="alert alert-success d-none" role="alert"></div>
                            <form id="registerForm">
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label">Họ và tên</label>
                                        <input type="text" class="form-control" id="fullName" placeholder="Họ và tên" required/>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label">Tên đăng nhập</label>
                                        <input type="text" class="form-control" id="username" placeholder="Tên đăng nhập" required/>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label">Email</label>
                                        <input type="email" class="form-control" id="email" placeholder="Email" required/>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label">Số điện thoại</label>
                                        <input type="tel" class="form-control" id="phoneNumber" placeholder="Số điện thoại" required/>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-12 mb-3">
                                        <label class="form-label">Địa chỉ</label>
                                        <div class="input-group">
                                            <span class="input-group-text"><i class="fa-solid fa-location-dot"></i></span>
                                            <input type="text" class="form-control" id="address" placeholder="Nhập địa chỉ của bạn"/>
                                        </div>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label">Mật khẩu</label>
                                        <input type="password" class="form-control" id="password" placeholder="Mật khẩu" required/>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label">Nhập lại mật khẩu</label>
                                        <input type="password" class="form-control" id="confirmPassword" placeholder="Nhập lại mật khẩu" required/>
                                    </div>
                                </div>
                                <div class="form-check d-flex justify-content-center mb-4 mt-2">
                                    <input class="form-check-input me-2" type="checkbox" id="terms" required />
                                    <label class="form-check-label" for="terms">Tôi đồng ý với <a href="#" class="text-body"><u>Điều khoản sử dụng</u></a></label>
                                </div>
                                <div class="d-grid gap-2">
                                    <button type="submit" class="btn btn-success btn-lg text-white fw-bold">Đăng ký</button>
                                </div>
                                <p class="text-center text-muted mt-4 mb-0">Đã có tài khoản? <a href="login.html" class="fw-bold text-body"><u>Đăng nhập</u></a></p>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="py-5 bg-dark mt-auto">
        <div class="container"><p class="m-0 text-center text-white">Copyright &copy; FoodieDash 2024</p></div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            errorDiv.classList.add('d-none');
            successDiv.classList.add('d-none');

            const userData = {
                fullName: document.getElementById('fullName').value,
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                phoneNumber: document.getElementById('phoneNumber').value,
                address: document.getElementById('address').value,
                password: document.getElementById('password').value,
                confirmPassword: document.getElementById('confirmPassword').value
            };

            if (userData.password !== userData.confirmPassword) {
                errorDiv.textContent = 'Mật khẩu không khớp!';
                errorDiv.classList.remove('d-none');
                return;
            }

            if (userData.password.length < 6) {
                errorDiv.textContent = 'Mật khẩu phải có ít nhất 6 ký tự!';
                errorDiv.classList.remove('d-none');
                return;
            }

            const result = register(userData);
            if (result.success) {
                successDiv.textContent = result.message + ' Chuyển đến trang đăng nhập...';
                successDiv.classList.remove('d-none');
                setTimeout(() => { window.location.href = 'login.html'; }, 2000);
            } else {
                errorDiv.textContent = result.message;
                errorDiv.classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
