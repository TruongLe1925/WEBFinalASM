<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Lịch sử đơn hàng - FoodieDash</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --primary: #ff6b35; }
        .sidebar-link { display: block; padding: 10px 15px; color: #495057; text-decoration: none; border-radius: 8px; }
        .sidebar-link:hover, .sidebar-link.active { background-color: #e9ecef; color: var(--primary); }
        .status-pending { background-color: #fff3cd; color: #856404; }
        .status-confirmed { background-color: #d1ecf1; color: #0c5460; }
        .status-delivered { background-color: #d4edda; color: #155724; }
        .status-cancelled { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
        <div class="container">
            <a class="navbar-brand fw-bold" style="color: var(--primary);" href="index.html"><i class="bi bi-egg-fried"></i> FoodieDash</a>
            <div class="ms-auto"><span class="me-2 d-none d-sm-inline">Chào, <strong id="navUserName">User</strong></span></div>
        </div>
    </nav>

    <header class="bg-dark py-5">
        <div class="container px-4 px-lg-5 my-5">
            <div class="text-center text-white">
                <h1 class="display-4 fw-bolder">Lịch sử đơn hàng</h1>
                <p class="lead fw-normal text-white-50 mb-0">Theo dõi các đơn hàng của bạn</p>
            </div>
        </div>
    </header>

    <div class="container my-4">
        <div class="row g-4">
            <aside class="col-lg-3">
                <div class="card border-0 shadow-sm p-2">
                    <a href="customer-details.html" class="sidebar-link"><i class="bi bi-person"></i> Hồ sơ của tôi</a>
                    <a href="order-history.html" class="sidebar-link active"><i class="bi bi-clock-history"></i> Lịch sử đơn hàng</a>
                    <hr class="my-2">
                    <button onclick="handleLogout()" class="sidebar-link border-0 bg-transparent w-100 text-danger text-start"><i class="bi bi-box-arrow-left"></i> Đăng xuất</button>
                </div>
            </aside>

            <div class="col-lg-9">
                <div class="card border-0 shadow-sm p-4 mt-4">
                    <h5 class="fw-bold mb-4"><i class="bi bi-clock-history text-primary"></i> Lịch sử đơn hàng</h5>
                    <div id="emptyOrders" class="text-center py-5">
                        <i class="bi bi-inbox" style="font-size: 3rem; color: #6c757d;"></i>
                        <p class="mt-3 text-muted">Bạn chưa có đơn hàng nào</p>
                        <a href="index.html" class="btn btn-primary mt-2">Mua sắm ngay</a>
                    </div>
                    <div id="ordersTable" class="table-responsive d-none">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                            <tr><th>Mã đơn</th><th>Ngày đặt</th><th>Ghi chú</th><th>Trạng thái</th><th>Chi tiết</th></tr>
                            </thead>
                            <tbody id="ordersList"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="py-5 bg-dark mt-auto">
        <div class="container"><p class="m-0 text-center text-white">Copyright &copy; FoodieDash 2024</p></div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script>
        if (!isLoggedIn()) window.location.href = 'login.html';

        function handleLogout() {
            logout();
            window.location.href = 'index.html';
        }

        function formatDate(dateString) {
            return new Date(dateString).toLocaleDateString('vi-VN');
        }

        function getStatusBadge(status) {
            const statusMap = {
                'PENDING': { class: 'status-pending', text: 'Chờ xử lý' },
                'CONFIRMED': { class: 'status-confirmed', text: 'Đã xác nhận' },
                'DELIVERED': { class: 'status-delivered', text: 'Đã giao' },
                'CANCELLED': { class: 'status-cancelled', text: 'Đã hủy' }
            };
            const s = statusMap[status] || { class: 'status-pending', text: status };
            return `<span class="badge ${s.class}">${s.text}</span>`;
        }

        function renderOrders() {
            const user = getCurrentUser();
            if (user) document.getElementById('navUserName').textContent = user.fullName;
            const orders = getUserOrders();

            if (orders.length === 0) {
                document.getElementById('emptyOrders').classList.remove('d-none');
                document.getElementById('ordersTable').classList.add('d-none');
                return;
            }

            document.getElementById('emptyOrders').classList.add('d-none');
            document.getElementById('ordersTable').classList.remove('d-none');

            document.getElementById('ordersList').innerHTML = orders.map(order => `
                <tr>
                    <td><strong>${order.orderId}</strong></td>
                    <td>${formatDate(order.orderDate)}</td>
                    <td>${order.note || '-'}</td>
                    <td>${getStatusBadge(order.status)}</td>
                    <td><a href="order-details.html?id=${order.orderId}" class="btn btn-sm btn-outline-primary">Xem</a></td>
                </tr>
            `).join('');
        }

        document.addEventListener('DOMContentLoaded', renderOrders);
    </script>
</body>
</html>
