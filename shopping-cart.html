<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng - FoodieDash</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
        .cart-item-img { width: 100px; height: 100px; object-fit: cover; border-radius: 8px; }
        .qty-input { max-width: 60px; text-align: center; border: none; background: transparent; }
        .card { border-radius: 15px; }
        .btn-checkout { background-color: #ff5e00; color: white; border: none; font-weight: 600; }
        .btn-checkout:hover { background-color: #e65500; color: white; }
    </style>
    <link href="css/index.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container px-4 px-lg-5">
            <a class="navbar-brand" href="index.html"><i class="bi bi-egg-fried"></i> FoodieDash</a>
            <div class="d-flex">
                <a href="customer-details.html" class="btn btn-outline-dark ms-2"><i class="bi-person-fill"></i> Tài khoản</a>
                <button onclick="handleLogout()" class="btn btn-outline-danger ms-2"><i class="bi bi-box-arrow-left"></i> Đăng xuất</button>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <h2 class="fw-bold mb-4">Giỏ hàng của bạn</h2>
        <div id="emptyCart" class="text-center py-5">
            <i class="bi bi-cart-x" style="font-size: 4rem; color: #6c757d;"></i>
            <p class="mt-3 text-muted">Giỏ hàng của bạn đang trống</p>
            <a href="index.html" class="btn btn-primary mt-2">Tiếp tục mua sắm</a>
        </div>
        <div id="cartContent" class="row g-4 d-none">
            <div class="col-lg-8">
                <div class="card shadow-sm border-0 p-3">
                    <div class="table-responsive">
                        <table class="table align-middle">
                            <thead>
                            <tr class="text-muted small">
                                <th>SẢN PHẨM</th>
                                <th>SỐ LƯỢNG</th>
                                <th>GIÁ TIỀN</th>
                                <th></th>
                            </tr>
                            </thead>
                            <tbody id="cartItems"></tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="card shadow-sm border-0 p-4">
                    <h5 class="fw-bold mb-4">Chi tiết thanh toán</h5>
                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-muted">Tạm tính</span>
                        <span id="subtotal">0 đ</span>
                    </div>
                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-muted">Vận chuyển</span>
                        <span class="text-success">Miễn phí</span>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between mb-4">
                        <span class="fw-bold fs-5">Tổng cộng</span>
                        <span id="total" class="fw-bold fs-5 text-primary">0 đ</span>
                    </div>
                    <form id="checkoutForm">
                        <div class="mb-3">
                            <label for="orderNote" class="form-label small fw-bold text-muted">GHI CHÚ ĐƠN HÀNG</label>
                            <textarea class="form-control" id="orderNote" rows="3" placeholder="Ví dụ: Giao giờ hành chính..."></textarea>
                        </div>
                        <button type="submit" class="btn btn-checkout btn-lg w-100 py-3">THANH TOÁN</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="confirmDeleteModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header"><h5 class="modal-title">Xác nhận xóa</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">Bạn có chắc muốn xóa sản phẩm này?</div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                    <button type="button" id="confirmDelete" class="btn btn-danger">Xóa</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="py-5 bg-dark mt-auto">
        <div class="container"><p class="m-0 text-center text-white">Copyright &copy; FoodieDash 2024</p></div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script>
        let currentCart = [];
        let deleteItemId = null;

        if (!isLoggedIn()) window.location.href = 'login.html';

        function handleLogout() {
            logout();
            window.location.href = 'login.html';
        }

        function formatPrice(price) {
            return price.toLocaleString('vi-VN') + ' đ';
        }

        function renderCart() {
            currentCart = getCart();
            const cartItems = document.getElementById('cartItems');
            const emptyCart = document.getElementById('emptyCart');
            const cartContent = document.getElementById('cartContent');

            if (currentCart.length === 0) {
                emptyCart.classList.remove('d-none');
                cartContent.classList.add('d-none');
                return;
            }

            emptyCart.classList.add('d-none');
            cartContent.classList.remove('d-none');

            cartItems.innerHTML = currentCart.map(item => `
                <tr>
                    <td>
                        <div class="d-flex align-items-center">
                            <img src="${item.imageUrl}" class="cart-item-img me-3" alt="${item.productName}">
                            <div>
                                <h6 class="mb-0 fw-bold">${item.productName}</h6>
                                <p class="text-muted small mb-0">${item.description || ''}</p>
                            </div>
                        </div>
                    </td>
                    <td>
                        <div class="d-flex align-items-center border rounded-pill px-2 py-1" style="width: fit-content;">
                            <button onclick="updateQuantity('${item.cartItemId}', -1)" class="btn btn-sm btn-light">-</button>
                            <input value="${item.quantity}" class="qty-input" readonly>
                            <button onclick="updateQuantity('${item.cartItemId}', 1)" class="btn btn-sm btn-light">+</button>
                        </div>
                    </td>
                    <td><span class="fw-bold">${formatPrice(item.totalPrice * item.quantity)}</span></td>
                    <td><button type="button" class="btn btn-light btn-sm rounded-circle text-danger" onclick="showDeleteModal('${item.cartItemId}')">×</button></td>
                </tr>
            `).join('');

            updateTotals();
        }

        function updateQuantity(itemId, change) {
            const item = currentCart.find(i => i.cartItemId === itemId);
            if (!item) return;
            const newQuantity = item.quantity + change;
            if (newQuantity < 1) return;
            item.quantity = newQuantity;
            localStorage.setItem(CART_KEY, JSON.stringify(currentCart));
            renderCart();
        }

        function showDeleteModal(itemId) {
            deleteItemId = itemId;
            const modal = new bootstrap.Modal(document.getElementById('confirmDeleteModal'));
            modal.show();
        }

        function updateTotals() {
            const subtotal = currentCart.reduce((sum, item) => sum + (item.totalPrice * item.quantity), 0);
            document.getElementById('subtotal').textContent = formatPrice(subtotal);
            document.getElementById('total').textContent = formatPrice(subtotal);
        }

        document.getElementById('checkoutForm').addEventListener('submit', function(e) {
            e.preventDefault();
            if (currentCart.length === 0) {
                alert('Giỏ hàng của bạn đang trống!');
                return;
            }
            const user = getCurrentUser();
            const note = document.getElementById('orderNote').value;
            const subtotal = currentCart.reduce((sum, item) => sum + (item.totalPrice * item.quantity), 0);

            const orderData = {
                customerName: user.fullName,
                customerPhone: user.phoneNumber,
                customerAddress: user.address,
                items: currentCart,
                note: note,
                totalPrice: subtotal,
                discountTotalPrice: subtotal
            };

            const result = createOrder(orderData);
            if (result.success) {
                alert('Đặt hàng thành công! Mã đơn hàng: ' + result.order.orderId);
                window.location.href = 'order-history.html';
            }
        });

        document.getElementById('confirmDelete').addEventListener('click', function() {
            if (deleteItemId) {
                removeFromCart(deleteItemId);
                deleteItemId = null;
                bootstrap.Modal.getInstance(document.getElementById('confirmDeleteModal')).hide();
                renderCart();
            }
        });

        document.addEventListener('DOMContentLoaded', renderCart);
    </script>
</body>
</html>
